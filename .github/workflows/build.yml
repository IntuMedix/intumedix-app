name: Build IntuMedix App

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-web:
    name: Build Web + PWA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/
      # Deploy to GitHub Pages on main push
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build
      - run: npx cap sync android
      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-web, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/app-debug.apk
          name: IntuMedix ${{ github.ref_name }}
          body: |
            ## IntuMedix ${{ github.ref_name }}
            
            ### تحميل التطبيق
            - **Android**: حمّل ملف `app-debug.apk` أدناه
            - **الويب (PWA)**: زر [intumedix.app](https://YOUR_USERNAME.github.io/intumedix-app)
            
            ### تثبيت على Android
            1. حمّل الـ APK
            2. افتح الإعدادات → الأمان → اسمح بالمصادر المجهولة
            3. افتح الملف وثبّته
